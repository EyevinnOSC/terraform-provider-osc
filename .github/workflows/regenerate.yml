name: Regenerate resources

# Regenerates the auto-generated Terraform resources (and docs) from the OSC
# catalog API and opens a pull request with the diff.
#
# This workflow deliberately stops at the PR. It does NOT build a release or
# tag anything: new/changed/removed catalog services are potentially breaking
# changes for consumers, so a human reviews the diff, then bumps the version
# and pushes a `v*` tag, which triggers release.yml -> GoReleaser -> registry.

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 06:00 UTC, to pick up newly published catalog services.
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    name: Regenerate resources and docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: 'go.mod'
          cache: true

      # tfplugindocs (invoked by `make generate`) shells out to terraform.
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Generate resources from catalog
        env:
          OSC_API_KEY: ${{ secrets.OSC_API_KEY }}
          OSC_ACCESS_TOKEN: unused
        run: |
          cd template
          go run .

      - name: Format generated code
        run: make fmt

      - name: Verify it builds
        run: make build

      - name: Regenerate docs
        run: make generate

      - name: Create pull request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          branch: automated/regenerate-resources
          delete-branch: true
          commit-message: 'chore: regenerate OSC resources and docs from catalog'
          title: 'chore: regenerate OSC resources and docs from catalog'
          labels: automated
          body: |
            Automated regeneration of Terraform resources and docs from the OSC catalog API.

            - Resources generated by `template/` into `internal/provider/`
            - Docs regenerated via `make generate` (tfplugindocs)

            **Review the diff carefully** — added, changed, or removed resources can be
            breaking changes for provider consumers. After merging, bump the version and
            push a `v*` tag to release via `release.yml`.
